{% extends "frontend/base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-8">
            <div class="card shadow-lg border-0 mb-5">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4 border-bottom border-secondary pb-3">Meu Perfil</h3>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">{% bootstrap_field form.username %}</div>
                            <div class="col-12">{% bootstrap_field form.bio %}</div>
                        </div>

                        <h5 class="fw-bold mb-3 text-info">Interesses / Problemas</h5>
                        <div class="p-3 rounded border border-secondary" style="background: rgba(0,0,0,0.2);">
                            <style>
                                .form-check { 
                                    padding: 12px 15px 12px 40px; 
                                    background: var(--bg-midnight); 
                                    border: 1px solid var(--accent-blue);
                                    border-radius: 10px; margin-bottom: 10px;
                                }
                                .form-check-input { scale: 1.3; }
                                @media (min-width: 768px) {
                                    .django-bootstrap5-checkbox-select-multiple { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
                                }
                            </style>
                            {% bootstrap_field form.problemas show_label=False %}
                        </div>
                        <div class="mt-4 d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">SALVAR E VER MAPA</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
